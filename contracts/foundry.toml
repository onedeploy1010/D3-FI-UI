[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

# Usage: forge script script/DeployTestUSDT.s.sol --rpc-url bsc_testnet --broadcast
[rpc_endpoints]
bsc = "${BSC_RPC_URL}"
bsc_testnet = "${BSC_TESTNET_RPC_URL}"

[etherscan]
bsc = { key = "${BSCSCAN_API_KEY}", chain = 56 }
bsc_testnet = { key = "${BSCSCAN_API_KEY}", chain = 97 }
