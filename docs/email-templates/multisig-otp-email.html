<!--
  D3 多签系统 — 邮箱验证码 (OTP) 邮件模板
  Supabase → Authentication → Email Templates → "Magic Link"
    Subject 建议：D3 多签系统登录验证码 {{ .Token }}
  关键：必须包含 {{ .Token }}（6 位验证码），app 用 verifyOtp 验证。
  也保留了 {{ .ConfirmationURL }} 作为「一键登录」备用链接。
  邮件安全：table 布局 + 全内联样式，无外部资源。
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0;padding:0;background-color:#f7f0f4;">
  <tr>
    <td align="center" style="padding:32px 16px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

      <!-- Card -->
      <table role="presentation" width="440" cellpadding="0" cellspacing="0" border="0" style="width:440px;max-width:100%;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(138,43,87,0.10);">

        <!-- Brand bar -->
        <tr><td style="height:4px;background:linear-gradient(90deg,#8A2B57,#E0568F,#F472B6);font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- Header -->
        <tr>
          <td align="center" style="padding:32px 32px 8px 32px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="52" height="52" align="center" valign="middle" style="width:52px;height:52px;background:linear-gradient(135deg,#8A2B57,#E0568F);border-radius:16px;color:#ffffff;font-size:24px;font-weight:800;">🛡</td>
              </tr>
            </table>
            <div style="margin-top:16px;font-size:20px;font-weight:800;color:#160510;letter-spacing:-0.02em;">D3 多签系统</div>
            <div style="margin-top:4px;font-size:13px;color:#8A2B57;opacity:0.75;">超级合伙人 · 邮箱验证码登录</div>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:16px 32px 8px 32px;">
            <p style="margin:0 0 16px 0;font-size:14px;line-height:1.6;color:#160510;">
              你好，请使用下方验证码登录 <b>D3 多签系统</b>。验证码短时间内有效，仅可使用一次。
            </p>

            <!-- OTP code -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" style="padding:8px 0 4px 0;">
                  <div style="display:inline-block;padding:18px 28px;background-color:#fbf7f9;border:1px solid rgba(224,86,143,0.25);border-radius:14px;">
                    <div style="font-size:32px;font-weight:800;letter-spacing:0.36em;color:#8A2B57;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;">{{ .Token }}</div>
                  </div>
                </td>
              </tr>
            </table>
            <p style="margin:12px 0 0 0;font-size:12px;line-height:1.5;color:#8A2B57;opacity:0.7;text-align:center;">
              把这 6 位验证码填入登录页即可。
            </p>
          </td>
        </tr>

        <!-- Fallback one-tap link -->
        <tr>
          <td align="center" style="padding:16px 32px 8px 32px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" style="border-radius:12px;background:linear-gradient(135deg,#8A2B57,#E0568F);">
                  <a href="{{ .ConfirmationURL }}" target="_blank"
                     style="display:inline-block;padding:12px 28px;font-size:14px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:12px;">
                    一键登录
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:12px 0 0 0;font-size:11px;line-height:1.5;color:#160510;opacity:0.45;text-align:center;">
              若非本人操作，请忽略此邮件。
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px 28px 32px;border-top:1px solid rgba(138,43,87,0.08);">
            <p style="margin:0;font-size:11px;line-height:1.5;color:#8A2B57;opacity:0.5;text-align:center;">
              D3 Finance · 多签系统　|　此邮件由系统自动发送，请勿回复
            </p>
          </td>
        </tr>

      </table>
      <!-- /Card -->

    </td>
  </tr>
</table>
