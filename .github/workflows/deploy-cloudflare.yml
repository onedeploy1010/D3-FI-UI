name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# VITE_* values are PUBLIC (they end up in the client bundle) so they live inline.
# Only CLOUDFLARE_API_TOKEN is a real secret (GitHub repo secret).
env:
  VITE_SUPABASE_URL: https://fbykfczfshcmfekdmrfp.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ToOtnOV0ewmzAGAVijklfw_i35DB5xy
  # Wallet auth is now Reown AppKit + SIWE (Privy removed). Project id is public.
  VITE_REOWN_PROJECT_ID: '3797379276b38cfb9f98d7e8b4d6c5dd'

jobs:
  dapp:
    name: Main dapp → d3-dapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` — pnpm reads it from package.json "packageManager".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm exec vite build
        env:
          VITE_BSC_USDT_ADDRESS: '0xE763F2dF7C8aDF28eAa34683245e3a6f82fC2512'
          VITE_USDT_IS_FAUCET: 'true'
          VITE_REFERRAL_REGISTRY_ADDRESS: '0x17da7b78448D04cD6E72Bf819Abb9a0C10553fED'
          VITE_DEMO_WALLET_ADDRESS: '0x1234567890abcdef1234567890abcdef12345678'
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/public --project-name=d3-dapp --branch=main

  admin:
    name: Admin panel → d3-admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # admin-panel uses npm (package-lock.json), NOT pnpm — mixing bundles React twice.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-panel/package-lock.json
      - name: Install + build admin
        working-directory: admin-panel
        run: |
          npm ci
          npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=d3-admin --branch=main
          workingDirectory: admin-panel
